<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Tester - Rather Party</title>
  <style>
    :root {
      --bg: #08080d; --card: rgba(255, 255, 255, 0.04);
      --text: #e8e9f1; --muted: #a5a1c8;
      --accent: #8c6cff; --warning: #ffd56b;
      --danger: #ff6f7a; --info: #37ffe2;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px; max-width: 800px; margin: 0 auto;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    
    .top-controls {
      display: flex; gap: 10px; margin-bottom: 20px;
      position: sticky; top: 10px; z-index: 100;
    }
    .btn-main {
      flex: 1; padding: 14px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: bold; cursor: pointer; color: #fff;
      transition: transform 0.1s ease;
    }
    .btn-main:active { transform: scale(0.97); }
    .btn-gen { background: linear-gradient(135deg, #7f65ff, #4d5dff); }
    .btn-report { background: linear-gradient(135deg, #ff6c8d, #ff9d4a); }
    
    .q-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.08);
      padding: 20px; margin-bottom: 16px; border-radius: 16px;
      transition: border-color 0.2s ease;
    }
    .q-text { font-size: 18px; font-weight: 600; line-height: 1.5; margin-bottom: 10px; }
    .q-hints { color: var(--warning); font-size: 14px; margin-bottom: 16px; font-weight: 600; }
    
    .eval-controls {
      display: flex; gap: 8px; flex-wrap: wrap;
      padding-top: 12px; border-top: 1px dashed rgba(255,255,255,0.1);
    }
    .comment-input {
      width: 100%; padding: 10px 12px; border-radius: 8px; border: 1px solid rgba(255,255,255,0.1);
      background: rgba(0,0,0,0.3); color: #fff; margin-bottom: 8px; font-size: 13px;
      outline: none; transition: border-color 0.2s ease;
    }
    .comment-input:focus { border-color: var(--accent); }

    .btn-eval {
      padding: 6px 12px; border: none; border-radius: 8px;
      font-size: 13px; font-weight: bold; cursor: pointer; color: #111;
    }
    .btn-eval:active { transform: scale(0.95); }
    .btn-funny { background: #50fa7b; }         /* Забавно */
    .btn-confusing { background: #ffb86c; }     /* Сбивает с толку */
    .btn-mismatch { background: #ff79c6; color: #fff; } /* Не подходит к вопросу */
    .btn-boring { background: #8ba4b8; }        /* Скучно */
    .btn-specific { background: #8be9fd; }      /* Специфично */
    .btn-inappropriate { background: #ff5555; color: #fff; } /* Неприемлемо */
    
    .tags-container {
      margin-top: 10px; display: flex; flex-direction: column; gap: 6px;
    }
    .tag-badge {
      font-size: 12px; padding: 8px 12px; border-radius: 6px;
      background: rgba(0,0,0,0.4); border-left: 4px solid; color: #fff;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
    }
    .tag-badge-content { flex: 1; }
    .delete-tag-btn {
      background: none; border: none; color: rgba(255,255,255,0.4);
      cursor: pointer; font-size: 14px; padding: 0 4px;
    }
    .delete-tag-btn:hover { color: #ff5555; }

    .tag-funny { border-color: #50fa7b; }
    .tag-confusing { border-color: #ffb86c; }
    .tag-mismatch { border-color: #ff79c6; }
    .tag-boring { border-color: #8ba4b8; }
    .tag-specific { border-color: #8be9fd; }
    .tag-inappropriate { border-color: #ff5555; }

    /* Report Modal */
    #report-modal {
      display: none; position: fixed; top: 0; left: 0;
      width: 100%; height: 100%; background: rgba(0,0,0,0.8);
      padding: 20px; box-sizing: border-box; z-index: 1000;
    }
    .modal-content {
      background: #1a1a24; max-width: 700px; margin: 20px auto;
      padding: 20px; border-radius: 16px; height: 80vh; display: flex; flex-direction: column;
    }
    textarea {
      flex: 1; width: 100%; background: #08080d; color: #e8e9f1;
      border: 1px solid rgba(255,255,255,0.1); border-radius: 8px;
      padding: 12px; font-family: monospace; font-size: 13px; resize: none;
    }
    .modal-buttons { display: flex; gap: 10px; margin-top: 12px; }
    .modal-btn {
      flex: 1; border: none; padding: 12px; border-radius: 8px; 
      font-weight: bold; cursor: pointer; color: #fff; font-size: 14px;
    }
    .btn-close { background: rgba(255,255,255,0.1); }
    .btn-close:hover { background: rgba(255,255,255,0.2); }
    .btn-clear { background: rgba(255, 85, 85, 0.2); color: #ff5555; border: 1px solid rgba(255, 85, 85, 0.4); }
    .btn-clear:hover { background: rgba(255, 85, 85, 0.4); color: #fff; }
    
    .instruction { font-size: 14px; color: var(--muted); margin-bottom: 20px; text-align: center; line-height: 1.5; }
  </style>
</head>
<body>

  <h1>🛠️ QA Tester</h1>
  <div class="instruction">
    Выделите любой текст (слово в вопросе или подсказку) и нажмите кнопку оценки.<br>
    Вы также можете вписать свой комментарий перед нажатием кнопки оценки!
  </div>

  <div class="top-controls">
    <button class="btn-main btn-gen" id="generate-btn">🔄 Generate 10 Questions</button>
    <button class="btn-main btn-report" id="report-btn">📋 Show Report (0)</button>
  </div>
  
  <div id="output"></div>

  <!-- Модальное окно отчета -->
  <div id="report-modal">
    <div class="modal-content">
      <h2 style="margin-top: 0;">Отчет (автоматически сохранен):</h2>
      <textarea id="report-text"></textarea>
      <div class="modal-buttons">
        <button class="modal-btn btn-close" onclick="document.getElementById('report-modal').style.display='none'">Закрыть окно</button>
        <button class="modal-btn btn-clear" id="clear-report-btn">🗑 Очистить память</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { questionsDatabase } from './src/data/questions.js';

    window.qaReportLog = JSON.parse(localStorage.getItem('qaReportLog')) || [];

    function updateReportCounter() {
      const btn = document.getElementById('report-btn');
      btn.innerText = `📋 Show Report (${window.qaReportLog.length})`;
    }
    updateReportCounter();

    function getValidOptions(question, fragIndex, currentState) {
      const frag = question.fragments[fragIndex];
      if (fragIndex === 0) return frag.options;
      
      const activeTypes = [];
      for (let i = 0; i < fragIndex; i++) {
        const stateIndex = currentState[i];
        if (stateIndex === undefined || stateIndex === -1) continue;
        const selectedOpt = question.fragments[i].options[stateIndex];
        if (selectedOpt && selectedOpt.type) {
          activeTypes.push(selectedOpt.type);
        }
      }

      const validOptions = frag.options.filter(opt => {
        if (!opt.requires || opt.requires.length === 0) return true;
        return opt.requires.some(req => activeTypes.includes(req));
      });
      
      return validOptions.length > 0 ? validOptions : frag.options;
    }

    function buildRandomQuestion() {
      const q = questionsDatabase[Math.floor(Math.random() * questionsDatabase.length)];
      
      const currentState = [];
      q.fragments.forEach((frag, i) => {
        const validOptions = getValidOptions(q, i, currentState);
        const randIdx = Math.floor(Math.random() * validOptions.length);
        currentState.push(q.fragments[i].options.indexOf(validOptions[randIdx]));
      });

      let str = q.text + " ";
      q.fragments.forEach((frag, i) => {
        str += frag.options[currentState[i]].text + " ";
      });
      
      let availableHints = q.hints ? [...q.hints] : [];
      q.fragments.forEach((frag, i) => {
        const selectedOption = frag.options[currentState[i]];
        if (selectedOption.hints && Array.isArray(selectedOption.hints)) {
          availableHints.push(...selectedOption.hints);
        }
      });
      
      availableHints = [...new Set(availableHints)];
      
      let finalHints = [];
      if (availableHints.length > 0) {
        const idx1 = Math.floor(Math.random() * availableHints.length);
        finalHints.push(availableHints.splice(idx1, 1)[0]);
      }
      if (availableHints.length > 0) {
        const idx2 = Math.floor(Math.random() * availableHints.length);
        finalHints.push(availableHints[idx2]);
      }

      return {
        category: q.category,
        text: str.trim(),
        hints: finalHints.join(" | ")
      };
    }

    // Глобальная функция записи фидбека
    window.tagIssue = function(issueType, typeLabel, btnEl) {
      const card = btnEl.closest('.q-card');
      const fullQ = card.dataset.q;
      const hints = card.dataset.hints;
      
      // Читаем кастомный комментарий из поля
      const commentInput = card.querySelector('.comment-input');
      const customComment = commentInput.value.trim();
      
      const selection = window.getSelection().toString().trim();
      const target = selection ? selection : "ВЕСЬ ВОПРОС ЦЕЛИКОМ";
      
      // Генерируем уникальный ID для возможности удаления
      const logId = Date.now().toString(36) + Math.random().toString(36).substr(2);
      
      window.qaReportLog.push({
        id: logId,
        typeLabel: typeLabel,
        target: target,
        comment: customComment,
        question: fullQ,
        hints: hints
      });

      localStorage.setItem('qaReportLog', JSON.stringify(window.qaReportLog));
      updateReportCounter();

      // Рендерим бейджик с крестиком удаления
      const tagsContainer = card.querySelector('.tags-container');
      const badge = document.createElement('div');
      badge.className = `tag-badge tag-${issueType}`;
      badge.id = `badge-${logId}`;
      
      let badgeHtml = `<div class="tag-badge-content"><strong>${typeLabel}:</strong> ${target}`;
      if (customComment) {
        badgeHtml += `<br><span style="color: #ffd56b; font-style: italic; margin-top: 4px; display: inline-block;">💬 ${customComment}</span>`;
      }
      badgeHtml += `</div><button class="delete-tag-btn" onclick="window.removeTag('${logId}')" title="Удалить оценку">✖</button>`;
      
      badge.innerHTML = badgeHtml;
      tagsContainer.appendChild(badge);
      
      card.style.borderColor = "rgba(140, 108, 255, 0.5)";
      
      // Сбрасываем поле ввода и выделение текста
      commentInput.value = "";
      window.getSelection().removeAllRanges();
    };

    // Глобальная функция удаления тега
    window.removeTag = function(logId) {
      // Удаляем из массива и обновляем память
      window.qaReportLog = window.qaReportLog.filter(log => log.id !== logId);
      localStorage.setItem('qaReportLog', JSON.stringify(window.qaReportLog));
      updateReportCounter();
      
      // Удаляем элемент интерфейса
      const badge = document.getElementById(`badge-${logId}`);
      if (badge) {
        const card = badge.closest('.q-card');
        badge.remove();
        // Если тегов на карточке больше нет, возвращаем обычный бордер
        if (card.querySelectorAll('.tag-badge').length === 0) {
          card.style.borderColor = "rgba(255,255,255,0.08)";
        }
      }
    };

    // Отрисовка новых вопросов
    document.getElementById('generate-btn').onclick = () => {
      const out = document.getElementById('output');
      out.innerHTML = '';
      
      for(let i = 0; i < 10; i++) {
        const data = buildRandomQuestion();
        out.innerHTML += `
          <div class="q-card" data-q="${data.text}" data-hints="${data.hints}">
            <div class="q-text">${data.text}</div>
            <div class="q-hints">💡 Hints: ${data.hints}</div>
            
            <div class="eval-controls">
              <input type="text" class="comment-input" placeholder="Доп. комментарий (необязательно)..." onmousedown="event.stopPropagation()">
              <button class="btn-eval btn-funny" onmousedown="event.preventDefault(); window.tagIssue('funny', 'Забавно', this)">Забавно</button>
              <button class="btn-eval btn-mismatch" onmousedown="event.preventDefault(); window.tagIssue('mismatch', 'Не подходит к вопросу', this)">Не подходит</button>
              <button class="btn-eval btn-confusing" onmousedown="event.preventDefault(); window.tagIssue('confusing', 'Сбивает с толку', this)">Сбивает с толку</button>
              <button class="btn-eval btn-boring" onmousedown="event.preventDefault(); window.tagIssue('boring', 'Скучно', this)">Скучно</button>
              <button class="btn-eval btn-specific" onmousedown="event.preventDefault(); window.tagIssue('specific', 'Специфично', this)">Специфично</button>
              <button class="btn-eval btn-inappropriate" onmousedown="event.preventDefault(); window.tagIssue('inappropriate', 'Неприемлемо', this)">Неприемлемо</button>
            </div>
            
            <div class="tags-container"></div>
          </div>
        `;
      }
    };

    // Генерация отчета
    document.getElementById('report-btn').onclick = () => {
      const modal = document.getElementById('report-modal');
      const textarea = document.getElementById('report-text');
      
      if (window.qaReportLog.length === 0) {
        textarea.value = "Вы еще не отметили ни одной проблемы. Сгенерируйте вопросы и оцените их!";
      } else {
        let markdown = "### 🛠️ QA Report\\n\\n";
        window.qaReportLog.forEach((log, index) => {
          markdown += `**Оценка ${index + 1}:** ${log.typeLabel}\\n`;
          markdown += `**Относится к:** "${log.target}"\\n`;
          if (log.comment) markdown += `**Ваш комментарий:** ${log.comment}\\n`;
          markdown += `*Полный вопрос:* ${log.question}\\n`;
          markdown += `*Подсказки:* ${log.hints}\\n`;
          markdown += `---\\n\\n`;
        });
        textarea.value = markdown;
      }
      
      modal.style.display = 'block';
    };

    // Кнопка полной очистки памяти
    document.getElementById('clear-report-btn').onclick = () => {
      if(confirm("Вы уверены, что хотите удалить весь сохраненный отчет?")) {
        window.qaReportLog = [];
        localStorage.removeItem('qaReportLog');
        updateReportCounter();
        document.getElementById('report-text').value = "Память очищена. Отчет пуст.";
        
        document.querySelectorAll('.tags-container').forEach(c => c.innerHTML = '');
        document.querySelectorAll('.q-card').forEach(c => c.style.borderColor = 'rgba(255,255,255,0.08)');
      }
    };

    document.getElementById('generate-btn').click();
  </script>
</body>
</html>
