<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>QA Tester 3.0 - WordShifter Balance (7 Levels)</title>
  <style>
    :root {
      --bg: #08080d; --card: rgba(255, 255, 255, 0.04);
      --text: #e8e9f1; --muted: #a5a1c8;
      --accent: #8c6cff; --warning: #ffd56b;
      --danger: #ff6f7a; --positive: #37ffe2;
    }
    body {
      background: var(--bg); color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      padding: 20px; max-width: 900px; margin: 0 auto;
    }
    h1 { text-align: center; margin-bottom: 20px; }
    
    .top-controls {
      display: flex; gap: 10px; margin-bottom: 20px;
      position: sticky; top: 10px; z-index: 100;
    }
    .btn-main {
      flex: 1; padding: 14px; border: none; border-radius: 12px;
      font-size: 16px; font-weight: bold; cursor: pointer; color: #fff;
      transition: transform 0.1s ease;
    }
    .btn-main:active { transform: scale(0.97); }
    .btn-gen { background: linear-gradient(135deg, #7f65ff, #4d5dff); }
    .btn-report { background: linear-gradient(135deg, #ff6c8d, #ff9d4a); }
    
    .q-card {
      background: var(--card); border: 1px solid rgba(255,255,255,0.08);
      padding: 20px; margin-bottom: 25px; border-radius: 16px;
      transition: border-color 0.2s ease;
    }
    
    .meta-tags {
      display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap;
    }
    .badge {
      font-size: 11px; padding: 4px 8px; border-radius: 6px; font-weight: bold; letter-spacing: 0.05em; text-transform: uppercase;
    }
    .badge-nerf { background: rgba(255, 111, 122, 0.2); color: var(--danger); border: 1px solid rgba(255, 111, 122, 0.4); }
    .badge-multi { background: rgba(55, 255, 226, 0.2); color: var(--positive); border: 1px solid rgba(55, 255, 226, 0.4); }
    .badge-normal { background: rgba(165, 161, 200, 0.2); color: var(--muted); border: 1px solid rgba(165, 161, 200, 0.4); }

    .q-context {
      background: rgba(0,0,0,0.3); padding: 14px; border-radius: 10px;
      margin-bottom: 16px; border-left: 3px solid var(--accent);
    }
    .q-context-item { margin-bottom: 6px; font-size: 14px; line-height: 1.4; }
    .q-context-item:last-child { margin-bottom: 0; }
    .q-context-item strong { color: var(--muted); }
    
    .spoiler-btn {
      width: 100%; background: rgba(255,255,255,0.05); border: 1px dashed rgba(255,255,255,0.2);
      color: var(--muted); padding: 10px; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: 600; margin-bottom: 16px; transition: 0.2s;
    }
    .spoiler-btn:hover { background: rgba(255,255,255,0.1); color: #fff; }
    .spoiler-content {
      display: none; font-size: 16px; color: #fff; margin-bottom: 16px; text-align: center;
      padding: 12px; background: rgba(55, 255, 226, 0.1); border-radius: 8px;
      border: 1px solid rgba(55, 255, 226, 0.3);
    }
    .spoiler-content strong { color: var(--positive); font-weight: 800; letter-spacing: 0.05em; }

    .reveal-step {
      background: rgba(0,0,0,0.35); padding: 16px; border-radius: 12px;
      border: 1px solid rgba(255,255,255,0.06); margin-bottom: 16px;
    }
    .step-header {
      font-size: 13px; color: var(--warning); font-weight: bold; margin-bottom: 12px;
      text-transform: uppercase; letter-spacing: 0.05em;
      display: flex; justify-content: space-between; align-items: center;
    }
    .step-header span.attempt-badge {
      background: var(--accent); color: #fff; padding: 4px 8px; border-radius: 6px; font-size: 10px;
    }
    
    .masked-wrapper {
      display: flex; flex-wrap: wrap; gap: 0; row-gap: 6px; align-items: center; margin-bottom: 12px;
      background: rgba(0, 0, 0, 0.2); padding: 12px; border-radius: 8px;
    }
    .revealed-char { font-size: 18px; font-weight: 800; color: var(--positive); padding: 0 1px; }
    .letter-gap { display: inline-block; width: 6px; height: 18px; background: rgba(140, 108, 255, 0.4); border-radius: 2px; margin: 0 4px; box-shadow: 0 0 6px rgba(140, 108, 255, 0.3); }
    .word-space { display: inline-block; width: 20px; height: 1px; vertical-align: middle; }

    .eval-controls { display: grid; grid-template-columns: repeat(auto-fit, minmax(110px, 1fr)); gap: 6px; margin-top: 10px; }
    .btn-eval {
      padding: 8px 4px; border: none; border-radius: 8px;
      font-size: 11px; font-weight: 800; cursor: pointer; color: #111;
      transition: transform 0.1s; text-transform: uppercase;
    }
    .btn-eval:active { transform: scale(0.95); }
    
    .btn-lvl-1 { background: #50fa7b; } 
    .btn-lvl-2 { background: #8be9fd; } 
    .btn-lvl-3 { background: #bd93f9; color: #fff; } 
    .btn-lvl-4 { background: #f1fa8c; } 
    .btn-lvl-5 { background: #ffb86c; } 
    .btn-lvl-6 { background: #ff5555; color: #fff; } 
    .btn-lvl-7 { background: #44475a; color: #ff5555; border: 1px solid #ff5555; } 

    .tags-container { margin-top: 8px; display: flex; flex-direction: column; gap: 4px; }
    .tag-badge {
      font-size: 12px; padding: 8px 12px; border-radius: 6px; background: rgba(0,0,0,0.6);
      border-left: 4px solid; color: #fff; display: flex; justify-content: space-between; align-items: center;
    }
    .delete-tag-btn { background: none; border: none; color: rgba(255,255,255,0.4); cursor: pointer; font-size: 14px; }
    
    #report-modal {
      display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0,0,0,0.8); padding: 20px; box-sizing: border-box; z-index: 1000;
    }
    .modal-content {
      background: #1a1a24; max-width: 700px; margin: 20px auto; padding: 20px;
      border-radius: 16px; height: 80vh; display: flex; flex-direction: column;
    }
    textarea {
      flex: 1; width: 100%; background: #08080d; color: #e8e9f1; border: 1px solid rgba(255,255,255,0.1);
      border-radius: 8px; padding: 12px; font-family: monospace; font-size: 13px; resize: none;
    }
    .modal-buttons { display: flex; gap: 10px; margin-top: 12px; }
    .modal-btn { flex: 1; border: none; padding: 12px; border-radius: 8px; font-weight: bold; cursor: pointer; color: #fff; font-size: 14px; }
    .btn-close { background: rgba(255,255,255,0.1); }
    .btn-clear { background: rgba(255, 85, 85, 0.2); color: #ff5555; border: 1px solid rgba(255, 85, 85, 0.4); }
  </style>
</head>
<body>

  <h1>🎲 QA Tester 3.0: 7 Уровней Баланса</h1>

  <div class="top-controls">
    <button class="btn-main btn-gen" id="generate-btn">🔄 Сгенерировать 10 сценариев</button>
    <button class="btn-main btn-report" id="report-btn">📋 Показать отчет (0)</button>
  </div>

  <div id="output"></div>

  <div id="report-modal">
    <div class="modal-content">
      <h2 style="margin-top: 0;">Отчет по балансу масок:</h2>
      <textarea id="report-text"></textarea>
      <div class="modal-buttons">
        <button class="modal-btn btn-close" onclick="document.getElementById('report-modal').style.display='none'">Закрыть</button>
        <button class="modal-btn btn-clear" id="clear-report-btn">🗑 Очистить</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { WordShifter } from './src/core/WordShifter.js';
    import { questionsDatabase } from './src/data/questions.js';
    import { SIMPLE_COLORS, SIMPLE_MATERIALS, SIMPLE_MOODS, SIMPLE_ERAS, SIMPLE_COUNTRIES, SIMPLE_CITIES, SIMPLE_FOODS } from './src/data/nerfWords.js';

    let scenarios = [];
    questionsDatabase.forEach(q => {
      const addHintScenarios = (hints, questionContext) => {
        if (!hints) return;
        hints.forEach(h => {
           if (h.brainstorm && h.brainstorm.length >= 2) {
             let hText = typeof h === 'object' ? h.text : h;
             scenarios.push({
               questionText: questionContext,
               hintText: hText,
               brainstorm: h.brainstorm
             });
           }
        });
      };
      addHintScenarios(q.hints, `${q.text} [ ... ]`);
      if (q.fragments) {
        q.fragments.forEach(f => {
          f.options.forEach(o => {
            addHintScenarios(o.hints, `${q.text} ... ${o.text} ...`);
          });
        });
      }
    });

    window.qaReport3Log = JSON.parse(localStorage.getItem('qaReport3Log')) || [];

    function updateReportCounter() {
      document.getElementById('report-btn').innerText = `📋 Показать отчет (${window.qaReport3Log.length})`;
    }
    updateReportCounter();

    function checkNerf(w1, w2) {
      const tokens1 = w1.split(/\s+/).filter(Boolean);
      const tokens2 = w2.split(/\s+/).filter(Boolean);
      const hasSimpleColor = tokens1.some(t => SIMPLE_COLORS.includes(t)) || tokens2.some(t => SIMPLE_COLORS.includes(t));
      const hasSimpleMaterialBoth = tokens1.some(t => SIMPLE_MATERIALS.includes(t)) && tokens2.some(t => SIMPLE_MATERIALS.includes(t));
      const hasSimpleMoodBoth = tokens1.some(t => SIMPLE_MOODS.includes(t)) && tokens2.some(t => SIMPLE_MOODS.includes(t));
      const hasSimpleEra = tokens1.some(t => SIMPLE_ERAS.includes(t)) || tokens2.some(t => SIMPLE_ERAS.includes(t));
      const hasSimpleCountry = tokens1.some(t => SIMPLE_COUNTRIES.includes(t)) || tokens2.some(t => SIMPLE_COUNTRIES.includes(t));
      const hasSimpleCity = SIMPLE_CITIES.includes(w1) || SIMPLE_CITIES.includes(w2);
      const hasSimpleFood = tokens1.some(t => SIMPLE_FOODS.includes(t)) || tokens2.some(t => SIMPLE_FOODS.includes(t));
      return hasSimpleColor || hasSimpleMaterialBoth || hasSimpleMoodBoth || hasSimpleEra || hasSimpleCountry || hasSimpleCity || hasSimpleFood;
    }

    function applyReveal(shifter, type, intensity) {
      if (type === 'positional') shifter.revealPositional(intensity);
      else if (type === 'random') shifter.revealRandom(intensity);
      else if (type === 'type') shifter.revealLetterType(intensity);
    }

    const REVEAL_TYPES = ['positional', 'random', 'type'];
    const REVEAL_LABELS = { 'positional': '📍 Positional', 'random': '🎲 Random', 'type': '🔤 Letters Type' };

    function generateScenario() {
      const scenario = scenarios[Math.floor(Math.random() * scenarios.length)];
      const pool = scenario.brainstorm;
      let w1 = pool[Math.floor(Math.random() * pool.length)].toUpperCase();
      let w2 = pool[Math.floor(Math.random() * pool.length)].toUpperCase();
      while(w1 === w2) { w2 = pool[Math.floor(Math.random() * pool.length)].toUpperCase(); }

      const isMultiWord = w1.split(/\s+/).length > 1 || w2.split(/\s+/).length > 1;
      const isNerfed = checkNerf(w1, w2);

      const shuffledReveals = [...REVEAL_TYPES].sort(() => Math.random() - 0.5);
      const r1 = shuffledReveals[0];
      const r2 = isMultiWord ? (r1 === 'random' ? 'type' : 'random') : shuffledReveals[1]; 

      const shifter = new WordShifter(w1, w2, isNerfed, isMultiWord);
      applyReveal(shifter, r1, 1);
      const masksStep1 = shifter.getMaskedWords();

      applyReveal(shifter, r2, 2);
      const masksStep2 = shifter.getMaskedWords();

      return { 
        w1, w2, isNerfed, isMultiWord, r1, r2, 
        masksStep1, masksStep2,
        questionText: scenario.questionText,
        hintText: scenario.hintText
      };
    }

    const LEVEL_COLORS = {
      'lvl1': '#50fa7b', 'lvl2': '#8be9fd', 'lvl3': '#bd93f9',
      'lvl4': '#f1fa8c', 'lvl5': '#ffb86c', 'lvl6': '#ff5555', 'lvl7': '#44475a'
    };

    window.tagAttemptBalance = function(attemptNum, level, label, btnEl) {
      const card = btnEl.closest('.q-card');
      const stepBlock = btnEl.closest('.reveal-step');
      
      const w1 = card.dataset.w1;
      const w2 = card.dataset.w2;
      const qText = card.dataset.q;
      const hint = card.dataset.hint;
      const r1 = card.dataset.r1;
      const r2 = card.dataset.r2;
      const meta = card.dataset.meta;
      
      const activeRevealMethod = (attemptNum === 1) ? r1 : r2;
      const logId = Date.now().toString(36) + Math.floor(Math.random()*1000);
      
      window.qaReport3Log.push({
        id: logId, w1, w2, qText, hint, meta, attempt: attemptNum,
        revealMethod: activeRevealMethod, r1, r2, level, label
      });

      localStorage.setItem('qaReport3Log', JSON.stringify(window.qaReport3Log));
      updateReportCounter();

      const tagsContainer = stepBlock.querySelector('.tags-container');
      tagsContainer.innerHTML = ''; 
      
      const colorCode = LEVEL_COLORS[level] || '#fff';

      const badge = document.createElement('div');
      badge.className = `tag-badge`;
      badge.style.borderColor = colorCode;
      badge.id = `badge-${logId}`;
      badge.innerHTML = `
        <div><strong>Попытка ${attemptNum}:</strong> ${label}</div>
        <button class="delete-tag-btn" onclick="window.removeTag('${logId}')">✖</button>
      `;
      
      tagsContainer.appendChild(badge);
      stepBlock.style.borderColor = colorCode;
      
      if (attemptNum === 2) {
        const spoilerBtn = card.querySelector('.spoiler-btn');
        if (spoilerBtn && spoilerBtn.style.display !== 'none') {
          spoilerBtn.click();
        }
      }
    };

    window.removeTag = function(logId) {
      window.qaReport3Log = window.qaReport3Log.filter(log => log.id !== logId);
      localStorage.setItem('qaReport3Log', JSON.stringify(window.qaReport3Log));
      updateReportCounter();
      
      const badge = document.getElementById(`badge-${logId}`);
      if (badge) {
        const stepBlock = badge.closest('.reveal-step');
        badge.remove();
        if (stepBlock.querySelectorAll('.tag-badge').length === 0) {
          stepBlock.style.borderColor = 'rgba(255,255,255,0.06)';
        }
      }
    };

    document.getElementById('generate-btn').onclick = () => {
      const out = document.getElementById('output');
      out.innerHTML = '';
      
      for(let i = 0; i < 10; i++) {
        const data = generateScenario();
        
        let metaTagsHtml = '';
        let metaString = '';
        if (data.isNerfed) { metaTagsHtml += '<span class="badge badge-nerf">⚡ Nerf Active</span>'; metaString += '[Nerfed] '; }
        if (data.isMultiWord) { metaTagsHtml += '<span class="badge badge-multi">🔗 Multi-word</span>'; metaString += '[Multi-word] '; }
        if (!data.isNerfed && !data.isMultiWord) { metaTagsHtml += '<span class="badge badge-normal">Стандарт</span>'; metaString += '[Normal] '; }

        out.innerHTML += `
          <div class="q-card" data-w1="${data.w1}" data-w2="${data.w2}" data-q="${data.questionText}" data-hint="${data.hintText}" data-r1="${REVEAL_LABELS[data.r1]}" data-r2="${REVEAL_LABELS[data.r2]}" data-meta="${metaString.trim()}">
            
            <div class="meta-tags">${metaTagsHtml}</div>
            
<div class="q-context">
  <div class="q-context-item"><strong>Подсказка:</strong> ${data.hintText}</div>
</div>

            <button class="spoiler-btn" onclick="this.nextElementSibling.style.display='block'; this.style.display='none';">👀 Показать оригинальные слова</button>
            <div class="spoiler-content">
              Скрытые слова: <strong>${data.w1}</strong> и <strong>${data.w2}</strong>
            </div>

            <!-- БЛОК ПЕРВОЙ ПОПЫТКИ -->
            <div class="reveal-step">
              <div class="step-header">
                <span>Попытка 1: ${REVEAL_LABELS[data.r1]}</span>
                <span class="attempt-badge">Базовая мощность</span>
              </div>
              <div class="masked-wrapper">${data.masksStep1.w1}</div>
              <div class="masked-wrapper">${data.masksStep1.w2}</div>
              
              <div class="eval-controls">
                <button class="btn-eval btn-lvl-1" title="Слишком легко" onclick="window.tagAttemptBalance(1, 'lvl1', 'Слишком легко', this)">1. Слишком легко</button>
                <button class="btn-eval btn-lvl-2" title="Легковато" onclick="window.tagAttemptBalance(1, 'lvl2', 'Легковато', this)">2. Легковато</button>
                <button class="btn-eval btn-lvl-3" title="Идеально" onclick="window.tagAttemptBalance(1, 'lvl3', 'Идеально', this)">3. Идеально</button>
                <button class="btn-eval btn-lvl-4" title="Сложновато" onclick="window.tagAttemptBalance(1, 'lvl4', 'Сложновато', this)">4. Сложновато</button>
                <button class="btn-eval btn-lvl-5" title="Слишком сложно" onclick="window.tagAttemptBalance(1, 'lvl5', 'Слишком сложно', this)">5. Слишком сложно</button>
                <button class="btn-eval btn-lvl-6" title="Угадайка" onclick="window.tagAttemptBalance(1, 'lvl6', 'Угадайка', this)">6. Угадайка</button>
                <button class="btn-eval btn-lvl-7" title="Сломано" onclick="window.tagAttemptBalance(1, 'lvl7', 'Сломано', this)">7. Сломано</button>
              </div>
              <div class="tags-container"></div>
            </div>

            <!-- БЛОК ВТОРОЙ ПОПЫТКИ -->
            <div class="reveal-step">
              <div class="step-header">
                <span>Попытка 2: ${REVEAL_LABELS[data.r2]} (Поверх первой)</span>
                <span class="attempt-badge" style="background:var(--warning); color:#111;">Усиленная мощность</span>
              </div>
              <div class="masked-wrapper">${data.masksStep2.w1}</div>
              <div class="masked-wrapper">${data.masksStep2.w2}</div>
              
              <div class="eval-controls">
                <button class="btn-eval btn-lvl-1" title="Слишком легко" onclick="window.tagAttemptBalance(2, 'lvl1', 'Слишком легко', this)">1. Слишком легко</button>
                <button class="btn-eval btn-lvl-2" title="Легковато" onclick="window.tagAttemptBalance(2, 'lvl2', 'Легковато', this)">2. Легковато</button>
                <button class="btn-eval btn-lvl-3" title="Идеально" onclick="window.tagAttemptBalance(2, 'lvl3', 'Идеально', this)">3. Идеально</button>
                <button class="btn-eval btn-lvl-4" title="Сложновато" onclick="window.tagAttemptBalance(2, 'lvl4', 'Сложновато', this)">4. Сложновато</button>
                <button class="btn-eval btn-lvl-5" title="Слишком сложно" onclick="window.tagAttemptBalance(2, 'lvl5', 'Слишком сложно', this)">5. Слишком сложно</button>
                <button class="btn-eval btn-lvl-6" title="Угадайка" onclick="window.tagAttemptBalance(2, 'lvl6', 'Угадайка', this)">6. Угадайка</button>
                <button class="btn-eval btn-lvl-7" title="Сломано" onclick="window.tagAttemptBalance(2, 'lvl7', 'Сломано', this)">7. Сломано</button>
              </div>
              <div class="tags-container"></div>
            </div>
            
          </div>
        `;
      }
    };

    document.getElementById('report-btn').onclick = () => {
      const modal = document.getElementById('report-modal');
      const textarea = document.getElementById('report-text');
      
      if (window.qaReport3Log.length === 0) {
        textarea.value = "Нет оценок для формирования отчета.";
      } else {
        let markdown = "### ⚖️ WordShifter Step-by-Step Balance Report\n\n";
        window.qaReport3Log.forEach((log, index) => {
          markdown += `**Запись ${index + 1}:** Попытка ${log.attempt} -> \`[${log.label.toUpperCase()}]\`\n`;
          markdown += `- **Подсказка:** *${log.hint}*\n`;
          markdown += `- **Текущий ревил на шаге:** ${log.revealMethod}\n`;
          markdown += `- **Слова:** ${log.w1} | ${log.w2} ${log.meta ? '\`' + log.meta + '\`' : ''}\n`;
          markdown += `- **Полное комбо сценария:** ${log.r1} -> ${log.r2}\n\n`;
        });
        textarea.value = markdown;
      }
      
      modal.style.display = 'block';
    };

    document.getElementById('clear-report-btn').onclick = () => {
      if(confirm("Очистить отчет о балансе?")) {
        window.qaReport3Log = [];
        localStorage.removeItem('qaReport3Log');
        updateReportCounter();
        document.getElementById('report-text').value = "Отчет очищен.";
        document.querySelectorAll('.tags-container').forEach(c => c.innerHTML = '');
        document.querySelectorAll('.reveal-step').forEach(c => c.style.borderColor = 'rgba(255,255,255,0.06)');
      }
    };

    document.getElementById('generate-btn').click();
  </script>
</body>
</html>
